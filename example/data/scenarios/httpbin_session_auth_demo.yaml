      cookie_name: "noop_cookie"
      cookie_value: "no_effect"
      set_cookie_params:
        from: "negative"
      verify_params:
        check: "negative-anything"
    expected:
      set_cookie_status_code: 200
      verify_status_code: 200
      assert_cookie_presence: false

