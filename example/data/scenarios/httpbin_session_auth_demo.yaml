cases:
  - id: "httpbin_cookie_session_case_1"
    title: "写入 sessionid Cookie 并验证会话"
    category: "session-positive"
    priority: "P0"
    markers: ["api", "demo"]
    request:
      set_cookie_method: "GET"
      verify_method: "GET"
      set_cookie_path: "/cookies/set/{cookie_name}/{cookie_value}"
      verify_path: "/cookies"
      cookie_name: "sessionid"
      cookie_value: "demo-session-001"
      set_cookie_params:
        from: "example"
      verify_params:
        check: "session"
    expected:
      set_cookie_status_code: 200
      verify_status_code: 200
      json_contains:
        cookies:
          sessionid: "demo-session-001"

