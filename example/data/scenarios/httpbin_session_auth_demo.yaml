  - id: "httpbin_cookie_session_negative_set_404"
    title: "设置 Cookie 接口返回 404，验证不会产生会话"
    category: "session-negative"
    priority: "P1"
    markers: ["api", "demo"]
    request:
      set_cookie_method: "GET"
      verify_method: "GET"
      set_cookie_path: "/status/404"
      verify_path: "/cookies"
      cookie_name: "broken_cookie"
      cookie_value: "should_not_exist"
      set_cookie_params:
        from: "negative"
      verify_params:
        check: "negative"
    expected:
      set_cookie_status_code: 404
      verify_status_code: 200
      assert_cookie_presence: false

  - id: "httpbin_cookie_session_negative_set_anything"
