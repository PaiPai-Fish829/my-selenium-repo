[pytest]
testpaths = tests
# 默认输出精简堆栈与失败汇总
addopts = --tb=short -ra -p no:markdown_report
disable_test_id_escaping_and_forfeit_all_rights_to_community_support = True
markers =
    api: 接口测试
    ui: UI 自动化测试
    demo: 演示/示例测试
    smoke: 冒烟测试
    custom_tag: 自定义业务标签
# 避免 Windows 终端中文乱码时可配合: set PYTHONUTF8=1
